<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!--
      Baseline security hardening (client-side only).

      Uwaga: HSTS, X-Frame-Options i Permissions-Policy MUSZĄ być nagłówkami HTTP
      i nie da się ich ustawić z poziomu <meta>. Lovable serwuje stronę po HTTPS
      z HSTS na poziomie platformy. `frame-ancestors` w meta jest ignorowane przez
      przeglądarki (spec) — jeśli kiedyś dojdzie własny serwer/CDN, ten sam
      whitelist należy przepisać na nagłówek `Content-Security-Policy` razem z
      `X-Frame-Options: DENY`.

      Poniżej Report-Only — niczego NIE blokuje, tylko loguje naruszenia w
      konsoli przeglądarki, żeby spokojnie zebrać whitelistę przed wymuszeniem.
    -->
    <meta
      http-equiv="Content-Security-Policy-Report-Only"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://plausible.io https://*.googletagmanager.com https://maps.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.googleapis.com;
        font-src 'self' data: https://fonts.gstatic.com;
        img-src 'self' data: blob: https: ;
        connect-src 'self' https://plausible.io https://*.google-analytics.com https://*.googleapis.com https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com;
        frame-src 'self' https://www.google.com https://*.google.com;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
        object-src 'none';
        upgrade-insecure-requests
      "
    />
    <title>FamilyFun – Sprawdzone atrakcje dla rodzin z dziećmi</title>
    <meta name="description" content="Odkryj sprawdzone miejsca i atrakcje dla dzieci. Opinie rodziców, które pomogą Ci zaplanować wspólny czas z dzieckiem." />
    <meta name="author" content="FamilyFun" />

    <meta property="og:title" content="FamilyFun – Sprawdzone atrakcje dla rodzin z dziećmi" />
    <meta property="og:description" content="Odkryj sprawdzone miejsca i atrakcje dla dzieci. Opinie rodziców, które pomogą Ci zaplanować wspólny czas z dzieckiem." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preload" as="image" href="/images/hero-parent-child.jpg" fetchpriority="high" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#497a5c" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Analytics: Plausible -->
    <script defer data-domain="familyfun.pl" src="https://plausible.io/js/script.js"></script>

    <!-- Analytics: GA4 (odkomentuj i uzupełnij ID żeby przełączyć)

  </head>
