<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!--
      Uwaga bezpieczeństwo: HSTS, X-Frame-Options, Permissions-Policy i CSP z
      `frame-ancestors` MUSZĄ być nagłówkami HTTP — meta CSP-Report-Only jest
      ignorowane przez przeglądarki (generowało tylko błędy w konsoli).
      Lovable serwuje stronę po HTTPS z HSTS na poziomie platformy; przy
      własnym serwerze/CDN dodać nagłówek `Content-Security-Policy`.
    -->
    <title>FamilyFun – Sprawdzone atrakcje dla rodzin z dziećmi</title>
    <meta name="author" content="FamilyFun" />

    <!-- Fonts: preconnect + stylesheet w <head> zamiast @import w CSS (szybszy FCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
    />

    <!-- Preload hero jest wstrzykiwany dynamicznie tylko na stronie głównej (src/pages/Index.tsx),
         żeby uniknąć warninga "preloaded but not used" na podstronach. -->

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#497a5c" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Analytics: Plausible -->
    <script defer data-domain="familyfun.pl" src="https://plausible.io/js/script.js"></script>

    <!-- Analytics: GA4 (odkomentuj i uzupełnij ID żeby przełączyć)
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
